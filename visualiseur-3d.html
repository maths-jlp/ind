<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Visualiseur de géométrie dans l'espace</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f2ea;
    --ink: #1a1a1a;
    --muted: #6b6558;
    --accent: #8b2018;
    --line: #d4cfc0;
    --panel: #ebe6d8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: 340px 1fr;
  }

  aside {
    background: var(--panel);
    border-right: 1px solid var(--line);
    padding: 20px;
    overflow-y: auto;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 20px;
  }

  .section {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .section:last-child { border-bottom: none; }

  h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 10px;
    background: var(--bg);
    padding: 3px;
    border-radius: 4px;
  }
  .tab {
    flex: 1;
    padding: 5px 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 3px;
    color: var(--muted);
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--ink);
    color: var(--bg);
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .coord-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 8px;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--line);
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink);
    border-radius: 3px;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
  }

  button.add {
    width: 100%;
    padding: 8px;
    background: var(--ink);
    color: var(--bg);
    border: none;
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    border-radius: 3px;
    margin-top: 6px;
    transition: background 0.15s;
  }
  button.add:hover { background: var(--accent); }

  .object-list { margin-top: 8px; }
  .obj-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: var(--bg);
    border-radius: 3px;
    margin-bottom: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .obj-color {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .obj-label { flex: 1; color: var(--ink); }
  .obj-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
  }
  .obj-del:hover { color: var(--accent); }

  .equation-mode {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .eq-btn {
    flex: 1;
    padding: 4px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    border: 1px solid var(--line);
    cursor: pointer;
    border-radius: 3px;
    color: var(--muted);
  }
  .eq-btn.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  main {
    position: relative;
    overflow: hidden;
  }
  #canvas { display: block; width: 100%; height: 100%; }

  .toolbar {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 6px;
    background: var(--panel);
    padding: 6px;
    border-radius: 4px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .tool-btn {
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--line);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border-radius: 3px;
    color: var(--ink);
  }
  .tool-btn:hover { background: var(--ink); color: var(--bg); }
  .tool-btn.active { background: var(--ink); color: var(--bg); }

  .info {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: var(--panel);
    padding: 10px 14px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    max-width: 320px;
  }

  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; font-style: italic; }

  .back-link {
    display: block;
    margin-bottom: 16px;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    transition: all 0.15s;
  }
  .back-link:hover {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
</style>
</head>
<body>

<aside>
  <a href="index.html" class="back-link">← Retour au tableau de bord</a>
  <h1>Géométrie dans l'espace</h1>
  <div class="subtitle">Visualiseur 3D — repère orthonormé</div>

  <div class="section">
    <h2>Ajouter un objet</h2>
    <div class="tabs">
      <button class="tab active" data-tab="point">Point</button>
      <button class="tab" data-tab="droite">Droite</button>
      <button class="tab" data-tab="plan">Plan</button>
    </div>

    <!-- POINT -->
    <div class="panel" id="panel-point">
      <label>Nom</label>
      <input type="text" id="pt-name" value="A" maxlength="3">
      <label style="margin-top:8px">Coordonnées (x ; y ; z)</label>
      <div class="coord-row">
        <input type="number" id="pt-x" value="1" step="0.5">
        <input type="number" id="pt-y" value="1" step="0.5">
        <input type="number" id="pt-z" value="1" step="0.5">
      </div>
      <button class="add" onclick="addPoint()">Ajouter le point</button>
    </div>

    <!-- DROITE -->
    <div class="panel" id="panel-droite" style="display:none">
      <div class="equation-mode">
        <button class="eq-btn active" data-mode="pv">Point + vecteur</button>
        <button class="eq-btn" data-mode="2pts">Deux points</button>
      </div>

      <div id="droite-pv">
        <label>Point A (x ; y ; z)</label>
        <div class="coord-row">
          <input type="number" id="dr-ax" value="0" step="0.5">
          <input type="number" id="dr-ay" value="0" step="0.5">
          <input type="number" id="dr-az" value="0" step="0.5">
        </div>
        <label>Vecteur directeur u⃗ (a ; b ; c)</label>
        <div class="coord-row">
          <input type="number" id="dr-ua" value="1" step="0.5">
          <input type="number" id="dr-ub" value="1" step="0.5">
          <input type="number" id="dr-uc" value="1" step="0.5">
        </div>
      </div>

      <div id="droite-2pts" style="display:none">
        <label>Point A (x ; y ; z)</label>
        <div class="coord-row">
          <input type="number" id="dr2-ax" value="0" step="0.5">
          <input type="number" id="dr2-ay" value="0" step="0.5">
          <input type="number" id="dr2-az" value="0" step="0.5">
        </div>
        <label>Point B (x ; y ; z)</label>
        <div class="coord-row">
          <input type="number" id="dr2-bx" value="2" step="0.5">
          <input type="number" id="dr2-by" value="1" step="0.5">
          <input type="number" id="dr2-bz" value="3" step="0.5">
        </div>
      </div>

      <button class="add" onclick="addLine()">Ajouter la droite</button>
    </div>

    <!-- PLAN -->
    <div class="panel" id="panel-plan" style="display:none">
      <div class="equation-mode">
        <button class="eq-btn active" data-pmode="cart">ax+by+cz+d=0</button>
        <button class="eq-btn" data-pmode="pn">Point + normal</button>
      </div>

      <div id="plan-cart">
        <label>Équation cartésienne</label>
        <div class="coord-row" style="grid-template-columns: 1fr 1fr 1fr 1fr; gap:4px">
          <input type="number" id="pl-a" value="1" step="0.5" placeholder="a">
          <input type="number" id="pl-b" value="1" step="0.5" placeholder="b">
          <input type="number" id="pl-c" value="1" step="0.5" placeholder="c">
          <input type="number" id="pl-d" value="-3" step="0.5" placeholder="d">
        </div>
        <div class="hint">a·x + b·y + c·z + d = 0</div>
      </div>

      <div id="plan-pn" style="display:none">
        <label>Point A (x ; y ; z)</label>
        <div class="coord-row">
          <input type="number" id="pl2-ax" value="1" step="0.5">
          <input type="number" id="pl2-ay" value="1" step="0.5">
          <input type="number" id="pl2-az" value="1" step="0.5">
        </div>
        <label>Vecteur normal n⃗ (a ; b ; c)</label>
        <div class="coord-row">
          <input type="number" id="pl2-na" value="1" step="0.5">
          <input type="number" id="pl2-nb" value="0" step="0.5">
          <input type="number" id="pl2-nc" value="1" step="0.5">
        </div>
      </div>

      <button class="add" onclick="addPlane()">Ajouter le plan</button>
    </div>
  </div>

  <div class="section">
    <h2>Objets affichés</h2>
    <div class="object-list" id="object-list">
      <div style="color:var(--muted); font-size:12px; font-style:italic">Aucun objet pour l'instant.</div>
    </div>
  </div>

  <div class="section">
    <h2>Exemples rapides</h2>
    <button class="add" style="background:var(--muted); margin-bottom:6px" onclick="loadExample1()">Plan médiateur de [AB]</button>
    <button class="add" style="background:var(--muted); margin-bottom:6px" onclick="loadExample2()">Droite ∩ Plan</button>
    <button class="add" style="background:var(--muted)" onclick="clearAll()">Tout effacer</button>
  </div>
</aside>

<main>
  <canvas id="canvas"></canvas>
  <div class="toolbar">
    <button class="tool-btn" onclick="resetCamera()">Vue initiale</button>
    <button class="tool-btn" onclick="toggleLabels()" id="lbl-btn">Étiquettes</button>
    <button class="tool-btn" onclick="toggleGrid()" id="grid-btn">Grille</button>
  </div>
  <div class="info">
    Clic gauche glisser : rotation • Molette : zoom • Clic droit glisser : déplacer
  </div>
</main>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ---------- Scene setup ----------
const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f2ea);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
const initialCamPos = new THREE.Vector3(8, 6, 10);
camera.position.copy(initialCamPos);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dir = new THREE.DirectionalLight(0xffffff, 0.5);
dir.position.set(5, 10, 7);
scene.add(dir);

// ---------- Camera orbit controls (manual, no OrbitControls dep) ----------
let spherical = { radius: 0, theta: 0, phi: 0 };
const target = new THREE.Vector3(0, 0, 0);

function updateSphericalFromCam() {
  const offset = camera.position.clone().sub(target);
  spherical.radius = offset.length();
  spherical.theta = Math.atan2(offset.x, offset.z);
  spherical.phi = Math.acos(Math.min(1, Math.max(-1, offset.y / spherical.radius)));
}
updateSphericalFromCam();

function applySpherical() {
  const sinPhi = Math.sin(spherical.phi);
  camera.position.set(
    target.x + spherical.radius * sinPhi * Math.sin(spherical.theta),
    target.y + spherical.radius * Math.cos(spherical.phi),
    target.z + spherical.radius * sinPhi * Math.cos(spherical.theta)
  );
  camera.lookAt(target);
}

let dragging = false, rightDrag = false, lastX = 0, lastY = 0;
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('pointerdown', e => {
  dragging = true;
  rightDrag = (e.button === 2);
  lastX = e.clientX; lastY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointerup', e => { dragging = false; });
canvas.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  if (rightDrag) {
    const panSpeed = spherical.radius * 0.0015;
    const right = new THREE.Vector3();
    const up = new THREE.Vector3();
    camera.matrix.extractBasis(right, up, new THREE.Vector3());
    target.addScaledVector(right, -dx * panSpeed);
    target.addScaledVector(up, dy * panSpeed);
    applySpherical();
  } else {
    spherical.theta -= dx * 0.005;
    spherical.phi -= dy * 0.005;
    spherical.phi = Math.max(0.05, Math.min(Math.PI - 0.05, spherical.phi));
    applySpherical();
  }
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  spherical.radius *= (e.deltaY > 0) ? 1.1 : 0.9;
  spherical.radius = Math.max(2, Math.min(80, spherical.radius));
  applySpherical();
}, { passive: false });

// ---------- Repère & grille ----------
const axesGroup = new THREE.Group();
const gridGroup = new THREE.Group();
const labelsGroup = new THREE.Group();

function makeAxis(dir, color, label) {
  const g = new THREE.Group();
  const L = 6;
  const mat = new THREE.LineBasicMaterial({ color, linewidth: 2 });
  const geom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), dir.clone().multiplyScalar(L)
  ]);
  g.add(new THREE.Line(geom, mat));
  // Arrow head
  const headGeom = new THREE.ConeGeometry(0.12, 0.35, 16);
  const head = new THREE.Mesh(headGeom, new THREE.MeshBasicMaterial({ color }));
  head.position.copy(dir.clone().multiplyScalar(L));
  head.lookAt(dir.clone().multiplyScalar(L+1));
  head.rotateX(Math.PI/2);
  g.add(head);
  // Label sprite
  const sprite = makeLabel(label, '#' + color.toString(16).padStart(6, '0'));
  sprite.position.copy(dir.clone().multiplyScalar(L + 0.6));
  g.add(sprite);
  return g;
}

function makeLabel(text, color = '#1a1a1a') {
  const canvas2 = document.createElement('canvas');
  canvas2.width = 128; canvas2.height = 64;
  const ctx = canvas2.getContext('2d');
  ctx.fillStyle = color;
  ctx.font = 'bold 44px EB Garamond, Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 64, 32);
  const tex = new THREE.CanvasTexture(canvas2);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(0.8, 0.4, 1);
  return sprite;
}

axesGroup.add(makeAxis(new THREE.Vector3(1,0,0), 0x8b2018, 'x'));
axesGroup.add(makeAxis(new THREE.Vector3(0,1,0), 0x2d5016, 'z')); // In math 3D, y-axis is vertical in three.js but we display as z
axesGroup.add(makeAxis(new THREE.Vector3(0,0,1), 0x1a4a6b, 'y'));
// Origin
const origMat = new THREE.MeshBasicMaterial({ color: 0x1a1a1a });
const origin = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), origMat);
axesGroup.add(origin);
const oLabel = makeLabel('O');
oLabel.position.set(-0.3, -0.3, -0.3);
axesGroup.add(oLabel);
scene.add(axesGroup);

// Grille (plan xOy = sol)
function buildGrid() {
  gridGroup.clear();
  const size = 6;
  const mat = new THREE.LineBasicMaterial({ color: 0xd4cfc0, transparent: true, opacity: 0.6 });
  for (let i = -size; i <= size; i++) {
    const pts1 = [new THREE.Vector3(i, 0, -size), new THREE.Vector3(i, 0, size)];
    const pts2 = [new THREE.Vector3(-size, 0, i), new THREE.Vector3(size, 0, i)];
    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts1), mat));
    gridGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts2), mat));
  }
}
buildGrid();
scene.add(gridGroup);

// ---------- Object management ----------
// Note: In three.js, y is up by default. We treat math-z as three.js-y for display.
// Math coords (x, y, z) -> three.js (x, z, y) ... wait, let's use: math (x, y, z) -> three.js (x, z, y)? 
// Simpler: keep math coords directly, with math-z being vertical (three.js y).
// So math (x, y, z) -> three.js (x, z, y)
function toScene(x, y, z) {
  return new THREE.Vector3(x, z, y);
}

const objects = []; // { id, type, label, color, mesh, data }
let nextId = 1;
const palette = ['#8b2018', '#1a4a6b', '#2d5016', '#a06a14', '#5a3a7e', '#1f6f6f'];
let showLabels = true;
let showGrid = true;

function addObjToScene(obj) {
  scene.add(obj.mesh);
  objects.push(obj);
  renderObjectList();
}

function removeObj(id) {
  const idx = objects.findIndex(o => o.id === id);
  if (idx === -1) return;
  scene.remove(objects[idx].mesh);
  objects.splice(idx, 1);
  renderObjectList();
}

function renderObjectList() {
  const list = document.getElementById('object-list');
  if (objects.length === 0) {
    list.innerHTML = '<div style="color:var(--muted); font-size:12px; font-style:italic">Aucun objet pour l\'instant.</div>';
    return;
  }
  list.innerHTML = objects.map(o => `
    <div class="obj-item">
      <div class="obj-color" style="background:${o.color}"></div>
      <div class="obj-label">${o.desc}</div>
      <button class="obj-del" onclick="window.removeObj(${o.id})">×</button>
    </div>
  `).join('');
}
window.removeObj = removeObj;

// --- Point ---
window.addPoint = function() {
  const name = document.getElementById('pt-name').value || 'P';
  const x = parseFloat(document.getElementById('pt-x').value);
  const y = parseFloat(document.getElementById('pt-y').value);
  const z = parseFloat(document.getElementById('pt-z').value);
  const color = palette[nextId % palette.length];
  const group = new THREE.Group();
  const sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 24, 24),
    new THREE.MeshStandardMaterial({ color })
  );
  sphere.position.copy(toScene(x, y, z));
  group.add(sphere);
  const label = makeLabel(name, color);
  label.position.copy(toScene(x, y, z)).add(new THREE.Vector3(0.3, 0.3, 0.3));
  label.userData.isLabel = true;
  group.add(label);
  addObjToScene({
    id: nextId++, type: 'point', color,
    desc: `${name}(${x} ; ${y} ; ${z})`,
    mesh: group
  });
};

// --- Droite ---
document.querySelectorAll('.eq-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.eq-btn[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mode = btn.dataset.mode;
    document.getElementById('droite-pv').style.display = mode === 'pv' ? '' : 'none';
    document.getElementById('droite-2pts').style.display = mode === '2pts' ? '' : 'none';
  });
});

window.addLine = function() {
  const mode = document.querySelector('.eq-btn[data-mode].active').dataset.mode;
  let ax, ay, az, ua, ub, uc, desc;
  if (mode === 'pv') {
    ax = parseFloat(document.getElementById('dr-ax').value);
    ay = parseFloat(document.getElementById('dr-ay').value);
    az = parseFloat(document.getElementById('dr-az').value);
    ua = parseFloat(document.getElementById('dr-ua').value);
    ub = parseFloat(document.getElementById('dr-ub').value);
    uc = parseFloat(document.getElementById('dr-uc').value);
    desc = `D : A(${ax};${ay};${az}), u⃗(${ua};${ub};${uc})`;
  } else {
    ax = parseFloat(document.getElementById('dr2-ax').value);
    ay = parseFloat(document.getElementById('dr2-ay').value);
    az = parseFloat(document.getElementById('dr2-az').value);
    const bx = parseFloat(document.getElementById('dr2-bx').value);
    const by = parseFloat(document.getElementById('dr2-by').value);
    const bz = parseFloat(document.getElementById('dr2-bz').value);
    ua = bx - ax; ub = by - ay; uc = bz - az;
    desc = `D : A(${ax};${ay};${az}), B(${bx};${by};${bz})`;
  }
  const norm = Math.sqrt(ua*ua + ub*ub + uc*uc);
  if (norm < 1e-6) { alert('Vecteur directeur nul.'); return; }
  const t = 10;
  const p1 = toScene(ax - t*ua, ay - t*ub, az - t*uc);
  const p2 = toScene(ax + t*ua, ay + t*ub, az + t*uc);
  const color = palette[nextId % palette.length];
  const group = new THREE.Group();
  // Tube for thickness
  const curve = new THREE.LineCurve3(p1, p2);
  const tube = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 2, 0.025, 8, false),
    new THREE.MeshStandardMaterial({ color })
  );
  group.add(tube);
  // Point A marker
  const pA = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 16, 16),
    new THREE.MeshStandardMaterial({ color })
  );
  pA.position.copy(toScene(ax, ay, az));
  group.add(pA);
  addObjToScene({
    id: nextId++, type: 'line', color, desc,
    mesh: group
  });
};

// --- Plan ---
document.querySelectorAll('.eq-btn[data-pmode]').forEach(btn => {

window.addPlane = function() {
  const mode = document.querySelector('.eq-btn[data-pmode].active').dataset.pmode;
  let a, b, c, d, desc;
  if (mode === 'cart') {
    a = parseFloat(document.getElementById('pl-a').value);
    b = parseFloat(document.getElementById('pl-b').value);
    c = parseFloat(document.getElementById('pl-c').value);
    d = parseFloat(document.getElementById('pl-d').value);
    desc = formatPlaneEq(a, b, c, d);
  } else {
    const ax = parseFloat(document.getElementById('pl2-ax').value);
    const ay = parseFloat(document.getElementById('pl2-ay').value);
    const az = parseFloat(document.getElementById('pl2-az').value);
    a = parseFloat(document.getElementById('pl2-na').value);
    b = parseFloat(document.getElementById('pl2-nb').value);
    c = parseFloat(document.getElementById('pl2-nc').value);
    d = -(a*ax + b*ay + c*az);
    desc = formatPlaneEq(a, b, c, d);
  }
  const norm = Math.sqrt(a*a + b*b + c*c);
  if (norm < 1e-6) { alert('Vecteur normal nul.'); return; }
  // Plane geometry: we create a square patch centered on closest point to origin
  const nVec = new THREE.Vector3(a, b, c).normalize();
  // Closest point on plane to origin
  const k = -d / (a*a + b*b + c*c);
  const center = new THREE.Vector3(a*k, b*k, c*k); // in math coords
  const color = palette[nextId % palette.length];
  const planeGeom = new THREE.PlaneGeometry(10, 10);
  const planeMat = new THREE.MeshStandardMaterial({
    color, transparent: true, opacity: 0.35, side: THREE.DoubleSide
  });
  const planeMesh = new THREE.Mesh(planeGeom, planeMat);
  // Orient: plane's default normal is +Z (three.js). We need to align it with nVec (math coords -> scene)
  const nScene = new THREE.Vector3(nVec.x, nVec.z, nVec.y); // math->scene
  const defaultNormal = new THREE.Vector3(0, 0, 1);
  const quat = new THREE.Quaternion().setFromUnitVectors(defaultNormal, nScene);
  planeMesh.quaternion.copy(quat);
  planeMesh.position.copy(toScene(center.x, center.y, center.z));
  const group = new THREE.Group();
  group.add(planeMesh);
  // Outline
  const edges = new THREE.EdgesGeometry(planeGeom);
  const outline = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color }));
  outline.quaternion.copy(quat);
  outline.position.copy(toScene(center.x, center.y, center.z));
  group.add(outline);
  // Normal vector indicator
  const normLine = new THREE.BufferGeometry().setFromPoints([
    toScene(center.x, center.y, center.z),
    toScene(center.x + nVec.x * 1.2, center.y + nVec.y * 1.2, center.z + nVec.z * 1.2)
  ]);
  group.add(new THREE.Line(normLine, new THREE.LineDashedMaterial({ color, dashSize: 0.15, gapSize: 0.1 })));
  addObjToScene({
    id: nextId++, type: 'plane', color, desc,
    mesh: group
  });
};

function formatPlaneEq(a, b, c, d) {
  const fmt = (v, first, sym) => {
    if (Math.abs(v) < 1e-9) return '';
    const s = v > 0 ? (first ? '' : ' + ') : ' − ';
    const abs = Math.abs(v);
    const num = abs === 1 ? '' : abs;
    return s + num + sym;
  };
  let eq = '';
  eq += fmt(a, eq === '', 'x');
  eq += fmt(b, eq === '', 'y');
  eq += fmt(c, eq === '', 'z');
  eq += fmt(d, eq === '', '');
  if (eq.startsWith(' + ')) eq = eq.slice(3);
  if (eq.startsWith(' − ')) eq = '−' + eq.slice(3);
  return `P : ${eq} = 0`;
}
