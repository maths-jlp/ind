<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractions équivalentes — jlp Maths Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg: #fafaf7;
    --panel: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6558;
    --line: #e5e0d4;
    --accent: #8b2018;
    --fill: #c85a3f;
    --stroke: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100vh;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    line-height: 1.3;
    padding: 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* === TOP BAR === */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .back-link {
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--muted);
    text-decoration: none;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
  }
  .back-link:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  h1 .accent { color: var(--accent); }

  /* === CONTROLS === */
  .controls {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    background: var(--panel);
    padding: 10px 14px;
    border: 1px solid var(--line);
    border-radius: 6px;
    flex-shrink: 0;
  }
  .fraction-input { display: flex; align-items: center; gap: 8px; }
  .fraction-input label {
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
  }
  .fraction-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  .fraction-stack input {
    width: 56px;
    padding: 3px 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--bg);
    color: var(--ink);
  }
  .fraction-stack input:focus { outline: none; border-color: var(--accent); }
  .fraction-stack .bar { width: 50px; height: 2px; background: var(--ink); }

  .form-toggle {
    display: flex;
    gap: 3px;
    padding: 2px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 5px;
  }
  .form-btn {
    padding: 4px 12px;
    background: transparent;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.15s;
  }
  .form-btn.active { background: var(--ink); color: var(--bg); }
  .form-btn:hover:not(.active) { color: var(--ink); }

  .presets { display: flex; gap: 4px; flex-wrap: wrap; }
  .preset-btn {
    padding: 3px 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 3px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink);
  }
  .preset-btn:hover {
    background: var(--accent);
    color: var(--panel);
    border-color: var(--accent);
  }

  .irr-status {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .irr-status.is-irr { color: #166534; font-weight: 700; }
  .irr-status strong { color: var(--accent); font-size: 14px; }

  /* === MAIN CONTENT === */
  .main {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 14px;
  }

  .main-figure {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .main-figure svg {
    width: 100%;
    height: auto;
    max-height: calc(100% - 40px);
    flex: 1;
    min-height: 0;
  }
  .main-figure .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    display: inline-block;
    text-align: center;
    line-height: 1;
  }
  .main-figure .label .top {
    border-bottom: 3px solid var(--accent);
    padding: 0 6px 1px;
    display: block;
  }
  .main-figure .label .bot {
    padding: 1px 6px 0;
    display: block;
  }

  .equiv-section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .equiv-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .equiv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 8px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    align-content: start;
  }

  .equiv-card {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 6px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .equiv-card svg {
    width: 100%;
    height: 64px;
    max-width: 80px;
  }
  .equiv-card .frac-inline {
    display: inline-block;
    text-align: center;
    line-height: 1;
  }
  .equiv-card .frac-inline .top {
    border-bottom: 1.5px solid var(--ink);
    padding: 0 3px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }
  .equiv-card .frac-inline .bot {
    padding: 0 3px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }
  .equiv-card.is-main {
    border-color: var(--accent);
    background: #fff8f6;
    border-width: 2px;
  }
  .equiv-card.is-main .frac-inline .top { border-bottom-color: var(--accent); }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .main-figure { max-height: 180px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <h1>jlp <span class="accent">Maths</span> Tools — Fractions équivalentes</h1>
  <a href="index.html" class="back-link">← Tableau de bord</a>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="fraction-input">
    <label>Fraction :</label>
    <div class="fraction-stack">
      <input type="number" id="num" value="1" min="0" max="20">
      <div class="bar"></div>
      <input type="number" id="den" value="2" min="1" max="20">
    </div>
  </div>

  <div class="form-toggle">
    <button class="form-btn active" data-form="disc">Disque</button>
    <button class="form-btn" data-form="bar">Barre</button>
    <button class="form-btn" data-form="square">Carré</button>
  </div>

  <div class="presets">
    <button class="preset-btn" onclick="setFraction(1,2)">1/2</button>
    <button class="preset-btn" onclick="setFraction(1,3)">1/3</button>
    <button class="preset-btn" onclick="setFraction(2,3)">2/3</button>
    <button class="preset-btn" onclick="setFraction(1,4)">1/4</button>
    <button class="preset-btn" onclick="setFraction(3,4)">3/4</button>
    <button class="preset-btn" onclick="setFraction(2,5)">2/5</button>
    <button class="preset-btn" onclick="setFraction(3,6)">3/6</button>
    <button class="preset-btn" onclick="setFraction(4,8)">4/8</button>
  </div>

  <div class="irr-status" id="irr-status"></div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- Figure principale compacte -->
  <div class="main-figure">
    <div id="main-svg-container" style="flex:1; display:flex; align-items:center; justify-content:center; width:100%; min-height:0;"></div>
    <div class="label">
      <span class="top" id="display-num">1</span>
      <span class="bot" id="display-den">2</span>
    </div>
  </div>

  <!-- Équivalentes -->
  <div class="equiv-section">
    <div class="equiv-title">Fractions équivalentes</div>
    <div class="equiv-grid" id="equiv-grid"></div>
  </div>
</div>

<script>
  let num = 1, den = 2;
  let currentForm = 'disc';

  const numInput = document.getElementById('num');
  const denInput = document.getElementById('den');
  const mainContainer = document.getElementById('main-svg-container');
  const equivGrid = document.getElementById('equiv-grid');

  function gcd(a, b) {
    a = Math.abs(a); b = Math.abs(b);
    while (b) { [a, b] = [b, a % b]; }
    return a || 1;
  }
  function reduce(n, d) {
    const g = gcd(n, d);
    return [n / g, d / g];
  }

  function drawDisc(filled, total, size = 200) {
    const cx = size / 2, cy = size / 2;
    const r = size / 2 - 6;
    if (total === 1) {
      const fill = filled === 1 ? 'var(--fill)' : 'var(--panel)';
      return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="var(--stroke)" stroke-width="2"/></svg>`;
    }
    let paths = '';
    for (let i = 0; i < total; i++) {
      const a1 = (i / total) * 2 * Math.PI - Math.PI / 2;
      const a2 = ((i + 1) / total) * 2 * Math.PI - Math.PI / 2;
      const x1 = cx + r * Math.cos(a1);
      const y1 = cy + r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2);
      const y2 = cy + r * Math.sin(a2);
      const largeArc = (a2 - a1) > Math.PI ? 1 : 0;
      const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
      const fill = i < filled ? 'var(--fill)' : 'var(--panel)';
      paths += `<path d="${d}" fill="${fill}" stroke="var(--stroke)" stroke-width="1.5"/>`;
    }
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">${paths}</svg>`;
  }

  function drawBar(filled, total, size = 200) {
    const w = size, h = size * 0.4;
    const partW = (w - 4) / total;
    let rects = '';
    for (let i = 0; i < total; i++) {
      const x = 2 + i * partW;
      const fill = i < filled ? 'var(--fill)' : 'var(--panel)';
      rects += `<rect x="${x}" y="${(size - h) / 2}" width="${partW}" height="${h}" fill="${fill}" stroke="var(--stroke)" stroke-width="1.5"/>`;
    }
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">${rects}</svg>`;
  }

  function drawSquare(filled, total, size = 200) {
    const s = Math.sqrt(total);
    let cols = Math.round(s);
    while (cols > 1 && total % cols !== 0) cols--;
    if (cols < 1) cols = 1;
    const rows = total / cols;
    if (!Number.isInteger(rows)) return drawBar(filled, total, size);
    const sq = size - 6;
    const cellW = sq / cols;
    const cellH = sq / rows;
    let rects = '';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const idx = r * cols + c;
        const x = 3 + c * cellW;
        const y = 3 + r * cellH;
        const fill = idx < filled ? 'var(--fill)' : 'var(--panel)';
        rects += `<rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" fill="${fill}" stroke="var(--stroke)" stroke-width="1.5"/>`;
      }
    }
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">${rects}</svg>`;
  }

  function drawShape(filled, total, size = 200) {
    if (currentForm === 'disc') return drawDisc(filled, total, size);
    if (currentForm === 'bar') return drawBar(filled, total, size);
    if (currentForm === 'square') return drawSquare(filled, total, size);
  }

  function render() {
    num = Math.max(0, Math.min(20, parseInt(numInput.value) || 0));
    den = Math.max(1, Math.min(20, parseInt(denInput.value) || 1));
    if (num > den) num = den;
    numInput.value = num;
    denInput.value = den;

    document.getElementById('display-num').textContent = num;
    document.getElementById('display-den').textContent = den;

    mainContainer.innerHTML = drawShape(num, den, 200);

    const [rn, rd] = reduce(num, den);
    const irrStatus = document.getElementById('irr-status');
    if (num === 0) {
      irrStatus.textContent = 'Fraction nulle';
      irrStatus.className = 'irr-status';
    } else if (rn === num && rd === den) {
      irrStatus.textContent = '✓ Irréductible';
      irrStatus.className = 'irr-status is-irr';
    } else {
      irrStatus.innerHTML = `Irréductible : <strong>${rn}/${rd}</strong>`;
      irrStatus.className = 'irr-status';
    }

    equivGrid.innerHTML = '';
    const maxDen = 20;
    for (let k = 1; k * rd <= maxDen; k++) {
      const n = rn * k;
      const d = rd * k;
      const isMain = (n === num && d === den);
      const card = document.createElement('div');
      card.className = 'equiv-card' + (isMain ? ' is-main' : '');
      card.innerHTML = `
        ${drawShape(n, d, 80)}
        <div class="frac-inline">
          <div class="top">${n}</div>
          <div class="bot">${d}</div>
        </div>
      `;
      equivGrid.appendChild(card);
    }
  }

  function setFraction(n, d) {
    numInput.value = n;
    denInput.value = d;
    render();
  }

  numInput.addEventListener('input', render);
  denInput.addEventListener('input', render);

  document.querySelectorAll('.form-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.form-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentForm = btn.dataset.form;
      render();
    });
  });

  render();
</script>

</body>
</html>
