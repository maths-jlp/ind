<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractions équivalentes — jlp Maths Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg: #fafaf7;
    --panel: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6558;
    --line: #e5e0d4;
    --accent: #8b2018;
    --fill: #c85a3f;
    --fill-light: #f4c8b8;
    --stroke: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    min-height: 100vh;
    line-height: 1.4;
    padding: 20px 24px;
  }

  .top-bar {
    max-width: 1200px;
    margin: 0 auto 20px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    gap: 12px;
  }
  .back-link {
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
  }
  .back-link:hover {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  h1 .accent { color: var(--accent); }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* === Controls === */
  .controls {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
    background: var(--panel);
    padding: 16px 20px;
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 24px;
  }

  .fraction-input {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .fraction-input label {
    font-family: 'EB Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--muted);
  }
  .fraction-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .fraction-stack input {
    width: 70px;
    padding: 6px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--bg);
    color: var(--ink);
  }
  .fraction-stack input:focus { outline: none; border-color: var(--accent); }
  .fraction-stack .bar {
    width: 60px;
    height: 2px;
    background: var(--ink);
  }

  .form-toggle {
    display: flex;
    gap: 4px;
    padding: 3px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
  }
  .form-btn {
    padding: 6px 16px;
    background: transparent;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.15s;
  }
  .form-btn.active {
    background: var(--ink);
    color: var(--bg);
  }
  .form-btn:hover:not(.active) { color: var(--ink); }

  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .preset-btn {
    padding: 5px 12px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink);
  }
  .preset-btn:hover {
    background: var(--accent);
    color: var(--panel);
    border-color: var(--accent);
  }

  /* === Figure principale === */
  .main-figure {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .main-figure svg {
    max-width: 280px;
    max-height: 280px;
    width: 100%;
    height: auto;
  }
  .main-info {
    flex: 1;
    min-width: 220px;
  }
  .main-info .big-fraction {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }
  .main-info .big-fraction .num,
  .main-info .big-fraction .den {
    display: block;
    text-align: center;
    width: fit-content;
  }
  .main-info .frac-vertical {
    display: inline-block;
    text-align: center;
    line-height: 1;
  }
  .main-info .frac-vertical .top {
    border-bottom: 4px solid var(--accent);
    padding: 0 8px 2px;
  }
  .main-info .frac-vertical .bot {
    padding: 2px 8px 0;
  }
  .main-info .irreducible {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .main-info .irreducible.is-irr {
    color: #166534;
    font-weight: 600;
  }

  /* === Grille équivalentes === */
  h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
  }

  .equiv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }

  .equiv-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .equiv-card svg {
    width: 100%;
    height: 110px;
    max-width: 130px;
  }
  .equiv-card .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
  }
  .equiv-card .frac-inline {
    display: inline-block;
    text-align: center;
    line-height: 1;
  }
  .equiv-card .frac-inline .top {
    border-bottom: 2px solid var(--ink);
    padding: 0 4px 1px;
    font-size: 18px;
  }
  .equiv-card .frac-inline .bot {
    padding: 1px 4px 0;
    font-size: 18px;
  }
  .equiv-card.is-main {
    border-color: var(--accent);
    background: #fff8f6;
  }
  .equiv-card.is-main .frac-inline .top { border-bottom-color: var(--accent); }

  @media (max-width: 600px) {
    .controls { gap: 14px; padding: 12px; }
    .main-figure { padding: 16px; gap: 16px; }
    .main-info .big-fraction { font-size: 48px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1>jlp <span class="accent">Maths</span> Tools — Fractions équivalentes</h1>
  <a href="index.html" class="back-link">← Tableau de bord</a>
</div>

<div class="container">

  <!-- Contrôles -->
  <div class="controls">

    <div class="fraction-input">
      <label>Fraction :</label>
      <div class="fraction-stack">
        <input type="number" id="num" value="1" min="0" max="20">
        <div class="bar"></div>
        <input type="number" id="den" value="2" min="1" max="20">
      </div>
    </div>

    <div class="form-toggle">
      <button class="form-btn active" data-form="disc">Disque</button>
      <button class="form-btn" data-form="bar">Barre</button>
      <button class="form-btn" data-form="square">Carré</button>
    </div>

    <div class="presets">
      <button class="preset-btn" onclick="setFraction(1,2)">1/2</button>
      <button class="preset-btn" onclick="setFraction(1,3)">1/3</button>
      <button class="preset-btn" onclick="setFraction(2,3)">2/3</button>
      <button class="preset-btn" onclick="setFraction(1,4)">1/4</button>
      <button class="preset-btn" onclick="setFraction(3,4)">3/4</button>
      <button class="preset-btn" onclick="setFraction(2,5)">2/5</button>
      <button class="preset-btn" onclick="setFraction(3,6)">3/6</button>
      <button class="preset-btn" onclick="setFraction(4,8)">4/8</button>
    </div>

  </div>

  <!-- Figure principale -->
  <div class="main-figure">
    <div id="main-svg-container"></div>
    <div class="main-info">
      <div class="big-fraction">
        <span class="frac-vertical">
          <div class="top" id="display-num">1</div>
          <div class="bot" id="display-den">2</div>
        </span>
      </div>
      <div class="irreducible" id="irr-status"></div>
    </div>
  </div>

  <!-- Fractions équivalentes -->
  <h2>Fractions équivalentes</h2>
  <div class="equiv-grid" id="equiv-grid"></div>

</div>

<script>
  // === État ===
  let num = 1, den = 2;
  let currentForm = 'disc';

  const numInput = document.getElementById('num');
  const denInput = document.getElementById('den');
  const mainContainer = document.getElementById('main-svg-container');
  const equivGrid = document.getElementById('equiv-grid');

  // === Utilitaires ===
  function gcd(a, b) {
    a = Math.abs(a); b = Math.abs(b);
    while (b) { [a, b] = [b, a % b]; }
    return a || 1;
  }

  function reduce(n, d) {
    const g = gcd(n, d);
    return [n / g, d / g];
  }

  // === Dessin d'un disque ===
  function drawDisc(filled, total, size = 240) {
    const cx = size / 2, cy = size / 2;
    const r = size / 2 - 8;

    if (total === 1) {
      // Cas particulier
      const fill = filled === 1 ? 'var(--fill)' : 'var(--panel)';
      return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="var(--stroke)" stroke-width="2"/>
      </svg>`;
    }

    let paths = '';
    for (let i = 0; i < total; i++) {
      const a1 = (i / total) * 2 * Math.PI - Math.PI / 2;
      const a2 = ((i + 1) / total) * 2 * Math.PI - Math.PI / 2;
      const x1 = cx + r * Math.cos(a1);
      const y1 = cy + r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2);
      const y2 = cy + r * Math.sin(a2);
      const largeArc = (a2 - a1) > Math.PI ? 1 : 0;
      const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
      const fill = i < filled ? 'var(--fill)' : 'var(--panel)';
      paths += `<path d="${d}" fill="${fill}" stroke="var(--stroke)" stroke-width="1.5"/>`;
    }
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
  }

  // === Dessin d'une barre ===
  function drawBar(filled, total, size = 240) {
    const w = size, h = size * 0.45;
    const partW = (w - 4) / total;
    let rects = '';
    for (let i = 0; i < total; i++) {
      const x = 2 + i * partW;
      const fill = i < filled ? 'var(--fill)' : 'var(--panel)';
      rects += `<rect x="${x}" y="${(size - h) / 2}" width="${partW}" height="${h}" fill="${fill}" stroke="var(--stroke)" stroke-width="1.5"/>`;
    }
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
  }

  // === Dessin d'un carré avec grille ===
  function drawSquare(filled, total, size = 240) {
    // Trouver la meilleure découpe en grille (lignes × colonnes = total)
    // On cherche les diviseurs les plus proches de sqrt(total)
    const s = Math.sqrt(total);
    let cols = Math.round(s);
    // Ajuster pour que cols divise total
    while (cols > 1 && total % cols !== 0) cols--;
    if (cols < 1) cols = 1;
    const rows = total / cols;
    // Si ça ne tombe pas juste, fallback : une seule ligne
    if (!Number.isInteger(rows)) {
      return drawBar(filled, total, size);
    }

    const sq = size - 8;
    const cellW = sq / cols;
    const cellH = sq / rows;
    let rects = '';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const idx = r * cols + c;
        const x = 4 + c * cellW;
        const y = 4 + r * cellH;
        const fill = idx < filled ? 'var(--fill)' : 'var(--panel)';
        rects += `<rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" fill="${fill}" stroke="var(--stroke)" stroke-width="1.5"/>`;
      }
    }
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
  }

  function drawShape(filled, total, size = 240) {
    if (currentForm === 'disc') return drawDisc(filled, total, size);
    if (currentForm === 'bar') return drawBar(filled, total, size);
    if (currentForm === 'square') return drawSquare(filled, total, size);
  }

  // === Rendu ===
  function render() {
    // Valider
    num = Math.max(0, Math.min(20, parseInt(numInput.value) || 0));
    den = Math.max(1, Math.min(20, parseInt(denInput.value) || 1));
    if (num > den) num = den; // éviter fractions > 1 pour l'affichage visuel

    // Mise à jour des inputs (en cas de clamp)
    numInput.value = num;
    denInput.value = den;

    // Affichage fraction principale
    document.getElementById('display-num').textContent = num;
    document.getElementById('display-den').textContent = den;

    // Figure principale
    mainContainer.innerHTML = drawShape(num, den, 260);

    // Statut irréductible
    const [rn, rd] = reduce(num, den);
    const irrStatus = document.getElementById('irr-status');
    if (num === 0) {
      irrStatus.textContent = 'Fraction nulle';
      irrStatus.className = 'irreducible';
    } else if (rn === num && rd === den) {
      irrStatus.textContent = '✓ Fraction irréductible';
      irrStatus.className = 'irreducible is-irr';
    } else {
      irrStatus.innerHTML = `Forme irréductible : <strong>${rn}/${rd}</strong>`;
      irrStatus.className = 'irreducible';
    }

    // Fractions équivalentes (multiples entiers de la forme irréductible)
    equivGrid.innerHTML = '';
    const maxDen = 24;
    for (let k = 1; k * rd <= maxDen; k++) {
      const n = rn * k;
      const d = rd * k;
      const isMain = (n === num && d === den);
      const card = document.createElement('div');
      card.className = 'equiv-card' + (isMain ? ' is-main' : '');
      card.innerHTML = `
        ${drawShape(n, d, 120)}
        <div class="frac-inline">
          <div class="top">${n}</div>
          <div class="bot">${d}</div>
        </div>
      `;
      equivGrid.appendChild(card);
    }
  }

  // === Handlers ===
  function setFraction(n, d) {
    numInput.value = n;
    denInput.value = d;
    render();
  }

  numInput.addEventListener('input', render);
  denInput.addEventListener('input', render);

  document.querySelectorAll('.form-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.form-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentForm = btn.dataset.form;
      render();
    });
  });

  // Init
  render();
</script>

</body>
</html>
