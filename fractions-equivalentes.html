<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractions équivalentes — jlp Maths Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg: #fafaf7;
    --panel: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6558;
    --line: #e5e0d4;
    --accent: #8b2018;
    --fill: #c85a3f;
    --stroke: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100vh;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    line-height: 1.3;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* === TOP BAR === */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .back-link {
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--muted);
    text-decoration: none;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
  }
  .back-link:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  h1 { font-size: 18px; font-weight: 700; }
  h1 .accent { color: var(--accent); }

  /* === CONTROLS === */
  .controls {
    display: flex;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
    background: var(--panel);
    padding: 8px 12px;
    border: 1px solid var(--line);
    border-radius: 6px;
    flex-shrink: 0;
  }
  .fraction-input { display: flex; align-items: center; gap: 6px; }
  .fraction-input label {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
  }
  .fraction-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  .fraction-stack input {
    width: 52px;
    padding: 3px 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: var(--bg);
    color: var(--ink);
  }
  .fraction-stack input:focus { outline: none; border-color: var(--accent); }
  .fraction-stack .bar { width: 46px; height: 2px; background: var(--ink); }

  .form-toggle {
    display: flex;
    gap: 3px;
    padding: 2px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 5px;
  }
  .form-btn {
    padding: 4px 11px;
    background: transparent;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.15s;
  }
  .form-btn.active { background: var(--ink); color: var(--bg); }
  .form-btn:hover:not(.active) { color: var(--ink); }

  .presets { display: flex; gap: 4px; flex-wrap: wrap; }
  .preset-btn {
    padding: 3px 9px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 3px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink);
  }
  .preset-btn:hover { background: var(--accent); color: var(--panel); border-color: var(--accent); }

  .irr-status {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .irr-status.is-irr { color: #166534; font-weight: 700; }
  .irr-status strong { color: var(--accent); font-size: 14px; }

  /* === MAIN GRID 3x3 === */
  .main {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 8px;
  }

  .equiv-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    overflow: hidden;
  }
  .equiv-card svg {
    flex: 1;
    width: 100%;
    min-height: 0;
  }
  .equiv-card .frac-inline {
    display: inline-block;
    text-align: center;
    line-height: 1;
    flex-shrink: 0;
  }
  .equiv-card .frac-inline .top {
    border-bottom: 2.5px solid var(--ink);
    padding: 0 6px 1px;
    font-size: 22px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .equiv-card .frac-inline .bot {
    padding: 1px 6px 0;
    font-size: 22px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .equiv-card.is-main {
    border: 3px solid var(--accent);
    background: #fff5f2;
  }
  .equiv-card.is-main .frac-inline .top {
    border-bottom-color: var(--accent);
    color: var(--accent);
  }
  .equiv-card.is-main .frac-inline .bot {
    color: var(--accent);
  }
  .equiv-card.is-irr {
    border: 2px solid #166534;
    background: #f2f9f5;
  }
  .equiv-card.is-irr .frac-inline .top {
    border-bottom-color: #166534;
    color: #166534;
  }
  .equiv-card.is-irr .frac-inline .bot {
    color: #166534;
  }
  .equiv-card.is-main.is-irr {
    border-color: var(--accent);
    background: #fff5f2;
  }
  .equiv-card.is-main.is-irr .frac-inline .top {
    border-bottom-color: var(--accent);
    color: var(--accent);
  }
  .equiv-card.is-main.is-irr .frac-inline .bot {
    color: var(--accent);
  }
  .equiv-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1>jlp <span class="accent">Maths</span> Tools — Fractions équivalentes</h1>
  <a href="index.html" class="back-link">← Tableau de bord</a>
</div>

<div class="controls">
  <div class="fraction-input">
    <label>Fraction :</label>
    <div class="fraction-stack">
      <input type="number" id="num" value="2" min="0" max="20">
      <div class="bar"></div>
      <input type="number" id="den" value="4" min="1" max="20">
    </div>
  </div>

  <div class="form-toggle">
    <button class="form-btn active" data-form="disc">Disque</button>
    <button class="form-btn" data-form="bar">Barre</button>
    <button class="form-btn" data-form="square">Carré</button>
  </div>

  <div class="presets">
    <button class="preset-btn" onclick="setFraction(1,2)">1/2</button>
    <button class="preset-btn" onclick="setFraction(1,3)">1/3</button>
    <button class="preset-btn" onclick="setFraction(2,3)">2/3</button>
    <button class="preset-btn" onclick="setFraction(1,4)">1/4</button>
    <button class="preset-btn" onclick="setFraction(3,4)">3/4</button>
    <button class="preset-btn" onclick="setFraction(2,5)">2/5</button>
    <button class="preset-btn" onclick="setFraction(3,6)">3/6</button>
    <button class="preset-btn" onclick="setFraction(4,8)">4/8</button>
  </div>

  <div class="irr-status" id="irr-status"></div>
</div>

<div class="main" id="main-grid"></div>

<script>
  let num = 2, den = 4;
  let currentForm = 'disc';

  const numInput = document.getElementById('num');
  const denInput = document.getElementById('den');
  const mainGrid = document.getElementById('main-grid');

  function gcd(a, b) {
    a = Math.abs(a); b = Math.abs(b);
    while (b) { [a, b] = [b, a % b]; }
    return a || 1;
  }
  function reduce(n, d) {
    const g = gcd(n, d);
    return [n / g, d / g];
  }

  function drawDisc(filled, total, size = 200) {
    const cx = size / 2, cy = size / 2, r = size / 2 - 6;
    if (total === 1) {
      const fill = filled === 1 ? 'var(--fill)' : 'var(--panel)';
      return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="var(--stroke)" stroke-width="2"/></svg>`;
    }
    let paths = '';
    for (let i = 0; i < total; i++) {
      const a1 = (i / total) * 2 * Math.PI - Math.PI / 2;
      const a2 = ((i + 1) / total) * 2 * Math.PI - Math.PI / 2;
      const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
      const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
      const la = (a2 - a1) > Math.PI ? 1 : 0;
      const d = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${la} 1 ${x2} ${y2} Z`;
      const fill = i < filled ? 'var(--fill)' : 'var(--panel)';
      paths += `<path d="${d}" fill="${fill}" stroke="var(--stroke)" stroke-width="1.5"/>`;
    }
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">${paths}</svg>`;
  }

  function drawBar(filled, total, size = 200) {
    const w = size, h = size * 0.4, partW = (w - 4) / total;
    let rects = '';
    for (let i = 0; i < total; i++) {
      const x = 2 + i * partW;
      const fill = i < filled ? 'var(--fill)' : 'var(--panel)';
      rects += `<rect x="${x}" y="${(size - h) / 2}" width="${partW}" height="${h}" fill="${fill}" stroke="var(--stroke)" stroke-width="1.5"/>`;
    }
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">${rects}</svg>`;
  }

  function drawSquare(filled, total, size = 200) {
    const s = Math.sqrt(total);
    let cols = Math.round(s);
    while (cols > 1 && total % cols !== 0) cols--;
    if (cols < 1) cols = 1;
    const rows = total / cols;
    if (!Number.isInteger(rows)) return drawBar(filled, total, size);
    const sq = size - 6, cellW = sq / cols, cellH = sq / rows;
    let rects = '';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const idx = r * cols + c;
        const x = 3 + c * cellW, y = 3 + r * cellH;
        const fill = idx < filled ? 'var(--fill)' : 'var(--panel)';
        rects += `<rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" fill="${fill}" stroke="var(--stroke)" stroke-width="1.5"/>`;
      }
    }
    return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">${rects}</svg>`;
  }

  function drawShape(filled, total, size = 200) {
    if (currentForm === 'disc') return drawDisc(filled, total, size);
    if (currentForm === 'bar') return drawBar(filled, total, size);
    if (currentForm === 'square') return drawSquare(filled, total, size);
  }

  function render() {
    num = Math.max(0, Math.min(20, parseInt(numInput.value) || 0));
    den = Math.max(1, Math.min(20, parseInt(denInput.value) || 1));
    if (num > den) num = den;
    numInput.value = num;
    denInput.value = den;

    const [rn, rd] = reduce(num, den);

    // Status
    const irrStatus = document.getElementById('irr-status');
    if (num === 0) {
      irrStatus.textContent = 'Fraction nulle';
      irrStatus.className = 'irr-status';
    } else if (rn === num && rd === den) {
      irrStatus.textContent = '✓ Irréductible';
      irrStatus.className = 'irr-status is-irr';
    } else {
      irrStatus.innerHTML = `Irréductible : <strong>${rn}/${rd}</strong>`;
      irrStatus.className = 'irr-status';
    }

    // Build exactly 9 equivalent fractions
    // Start from k=1 (irreducible) up to k=9
    const fractions = [];
    for (let k = 1; fractions.length < 9; k++) {
      const n = rn * k, d = rd * k;
      if (d > 100) break; // safety
      fractions.push({ n, d, k });
    }
    // If we don't have 9 (unlikely but possible with very large denominators), pad
    while (fractions.length < 9) {
      const k = fractions.length + 1;
      fractions.push({ n: rn * k, d: rd * k, k });
    }

    // Render grid
    mainGrid.innerHTML = '';
    for (const f of fractions) {
      const isMain = (f.n === num && f.d === den);
      const isIrr = (f.n === rn && f.d === rd && !(rn === num && rd === den));
      const card = document.createElement('div');
      let cls = 'equiv-card';
      if (isMain) cls += ' is-main';
      if (f.n === rn && f.d === rd && !isMain) cls += ' is-irr';
      card.className = cls;

      let labelText = '';
      if (isMain) labelText = '← ta fraction';
      else if (f.n === rn && f.d === rd) labelText = '← irréductible';

      card.innerHTML = `
        ${drawShape(f.n, f.d, 200)}
        <div class="frac-inline">
          <div class="top">${f.n}</div>
          <div class="bot">${f.d}</div>
        </div>
        ${labelText ? `<div class="equiv-label">${labelText}</div>` : ''}
      `;
      mainGrid.appendChild(card);
    }
  }

  function setFraction(n, d) {
    numInput.value = n;
    denInput.value = d;
    render();
  }

  numInput.addEventListener('input', render);
  denInput.addEventListener('input', render);

  document.querySelectorAll('.form-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.form-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentForm = btn.dataset.form;
      render();
    });
  });

  render();
</script>

</body>
</html>
