<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fond de projection — jlp Maths Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --grid-color: #b8c5d6;
    --grid-minor: #e0e6ef;
    --axis-color: #1a1a1a;
    --text-color: #1a1a1a;
    --accent: #8b2018;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #ffffff;
    font-family: 'EB Garamond', Georgia, serif;
  }

  /* === Toolbar === */
  .toolbar {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    background: #ffffff;
    padding: 6px;
    border: 1px solid #e5e0d4;
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    z-index: 100;
    transition: opacity 0.3s;
  }
  .toolbar.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .tool-btn {
    padding: 8px 14px;
    background: #fafaf7;
    border: 1px solid #e5e0d4;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tool-btn:hover {
    background: #1a1a1a;
    color: #ffffff;
    border-color: #1a1a1a;
  }
  .tool-btn.active {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
  }
  .tool-btn.utility {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 10px;
    color: #6b6558;
  }

  .separator {
    width: 1px;
    background: #e5e0d4;
    margin: 2px 4px;
  }

  /* Back link */
  .back-link {
    position: fixed;
    top: 12px;
    left: 12px;
    padding: 6px 12px;
    background: #fafaf7;
    border: 1px solid #e5e0d4;
    border-radius: 4px;
    color: #6b6558;
    text-decoration: none;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    z-index: 100;
    transition: all 0.15s;
  }
  .back-link:hover {
    background: #1a1a1a;
    color: #ffffff;
    border-color: #1a1a1a;
  }
  .back-link.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Hint */
  .hint {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    padding: 6px 14px;
    background: rgba(255,255,255,0.9);
    border: 1px solid #e5e0d4;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #6b6558;
    z-index: 100;
    transition: opacity 0.3s;
  }
  .hint.hidden { opacity: 0; pointer-events: none; }

  /* === Canvas container === */
  .canvas-container {
    width: 100vw;
    height: 100vh;
    display: flex;
  }

  .canvas-pane {
    height: 100%;
    position: relative;
    overflow: hidden;
  }
  .canvas-pane canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Modes */
  .mode-white .canvas-pane { flex: 1; background: #ffffff; }
  .mode-repere .canvas-pane { flex: 1; background: #ffffff; }
  .mode-millimetre .canvas-pane { flex: 1; background: #fafaf7; }
  .mode-seyes .canvas-pane { flex: 1; background: #ffffff; }

  .mode-split .canvas-pane.left {
    flex: 2;
    background: #ffffff;
    border-right: 2px solid #e0e6ef;
  }
  .mode-split .canvas-pane.right {
    flex: 1;
    background: #ffffff;
  }
</style>
</head>
<body class="mode-white">

<a href="index.html" class="back-link" id="backLink">← Tableau de bord</a>

<div class="toolbar" id="toolbar">
  <button class="tool-btn active" onclick="setMode('white')">Blanc</button>
  <button class="tool-btn" onclick="setMode('repere')">Repère</button>
  <button class="tool-btn" onclick="setMode('split')">2/3 · 1/3</button>
  <button class="tool-btn" onclick="setMode('millimetre')">Millimétré</button>
  <button class="tool-btn" onclick="setMode('seyes')">Lignes</button>
  <div class="separator"></div>
  <button class="tool-btn utility" onclick="toggleUI()">Masquer UI</button>
  <button class="tool-btn utility" onclick="toggleFullscreen()">Plein écran</button>
</div>

<div class="hint" id="hint">
  Touches : 1 Blanc · 2 Repère · 3 Split · 4 Millimétré · 5 Lignes · H masquer · F plein écran
</div>

<div class="canvas-container" id="container">
  <!-- Les panneaux seront injectés par JS -->
</div>

<script>
  const container = document.getElementById('container');
  const body = document.body;
  let currentMode = 'white';

  function setMode(mode) {
    currentMode = mode;
    // Reset classes
    body.className = 'mode-' + mode;
    // Reset active button
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    const modes = ['white','repere','split','millimetre','seyes'];
    const idx = modes.indexOf(mode);
    if (idx >= 0) {
      document.querySelectorAll('.toolbar .tool-btn')[idx].classList.add('active');
    }
    // Build panes
    container.innerHTML = '';
    if (mode === 'split') {
      const left = makePane('left');
      const right = makePane('right');
      container.appendChild(left);
      container.appendChild(right);
      drawRepere(right.querySelector('canvas'));
    } else {
      const pane = makePane('');
      container.appendChild(pane);
      const canvas = pane.querySelector('canvas');
      if (mode === 'repere') drawRepere(canvas);
      else if (mode === 'millimetre') drawMillimetre(canvas);
      else if (mode === 'seyes') drawSeyes(canvas);
      // 'white' = rien à dessiner
    }
  }

  function makePane(cls) {
    const pane = document.createElement('div');
    pane.className = 'canvas-pane' + (cls ? ' ' + cls : '');
    const cv = document.createElement('canvas');
    pane.appendChild(cv);
    return pane;
  }

  // === Dessin d'un repère orthonormé ===
  function drawRepere(canvas) {
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    // Plage des coordonnées
    const xMin = -10, xMax = 10;
    const yMin = -6, yMax = 6;

    // Calcul d'échelle orthonormée (on prend la plus petite pour que tout tienne)
    const scaleX = w / (xMax - xMin);
    const scaleY = h / (yMax - yMin);
    const scale = Math.min(scaleX, scaleY);

    // Origine centrée
    const cx = w / 2;
    const cy = h / 2;

    // Fonctions de conversion
    const X = x => cx + x * scale;
    const Y = y => cy - y * scale;

    // Grille mineure (toutes les 0.5 unités) - plus claire
    ctx.strokeStyle = '#e0e6ef';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    for (let x = Math.ceil(xMin * 2) / 2; x <= xMax; x += 0.5) {
      ctx.moveTo(X(x), 0);
      ctx.lineTo(X(x), h);
    }
    for (let y = Math.ceil(yMin * 2) / 2; y <= yMax; y += 0.5) {
      ctx.moveTo(0, Y(y));
      ctx.lineTo(w, Y(y));
    }
    ctx.stroke();

    // Grille majeure (unités entières)
    ctx.strokeStyle = '#b8c5d6';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = Math.ceil(xMin); x <= xMax; x++) {
      ctx.moveTo(X(x), 0);
      ctx.lineTo(X(x), h);
    }
    for (let y = Math.ceil(yMin); y <= yMax; y++) {
      ctx.moveTo(0, Y(y));
      ctx.lineTo(w, Y(y));
    }
    ctx.stroke();

    // Axes
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    // Axe x
    ctx.moveTo(0, Y(0));
    ctx.lineTo(w, Y(0));
    // Axe y
    ctx.moveTo(X(0), 0);
    ctx.lineTo(X(0), h);
    ctx.stroke();

    // Flèches des axes
    drawArrow(ctx, X(xMax) - 12, Y(0), X(xMax), Y(0));
    drawArrow(ctx, X(0), Y(yMax) + 12, X(0), Y(yMax));
  }

  function drawArrow(ctx, fromX, fromY, toX, toY) {
    const angle = Math.atan2(toY - fromY, toX - fromX);
    const size = 8;
    ctx.save();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.moveTo(toX, toY);
    ctx.lineTo(toX - size * Math.cos(angle - Math.PI/6), toY - size * Math.sin(angle - Math.PI/6));
    ctx.lineTo(toX - size * Math.cos(angle + Math.PI/6), toY - size * Math.sin(angle + Math.PI/6));
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // === Papier millimétré ===
  function drawMillimetre(canvas) {
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    const small = 10; // mm
    const mid = 50;   // 5mm -> renforcé
    const big = 100;  // 1cm -> encore plus fort

    // Mini grille
    ctx.strokeStyle = '#f0dcdc';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    for (let x = 0; x <= w; x += small) {
      ctx.moveTo(x, 0); ctx.lineTo(x, h);
    }
    for (let y = 0; y <= h; y += small) {
      ctx.moveTo(0, y); ctx.lineTo(w, y);
    }
    ctx.stroke();

    // Grille 5mm
    ctx.strokeStyle = '#e0b0b0';
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    for (let x = 0; x <= w; x += mid) {
      ctx.moveTo(x, 0); ctx.lineTo(x, h);
    }
    for (let y = 0; y <= h; y += mid) {
      ctx.moveTo(0, y); ctx.lineTo(w, y);
    }
    ctx.stroke();

    // Grille 1cm
    ctx.strokeStyle = '#c08080';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= w; x += big) {
      ctx.moveTo(x, 0); ctx.lineTo(x, h);
    }
    for (let y = 0; y <= h; y += big) {
      ctx.moveTo(0, y); ctx.lineTo(w, y);
    }
    ctx.stroke();
  }

  // === Lignes (Seyès simplifié) ===
  function drawSeyes(canvas) {
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    const spacing = 44;
    ctx.strokeStyle = '#a8c0d8';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let y = spacing; y <= h; y += spacing) {
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
    }
    ctx.stroke();

    // Marge gauche rouge
    ctx.strokeStyle = '#d87070';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(80, 0);
    ctx.lineTo(80, h);
    ctx.stroke();
  }

  // === UI controls ===
  function toggleUI() {
    document.getElementById('toolbar').classList.toggle('hidden');
    document.getElementById('backLink').classList.toggle('hidden');
    document.getElementById('hint').classList.toggle('hidden');
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }

  // Resize handler
  window.addEventListener('resize', () => {
    setMode(currentMode);
  });

  // Raccourcis clavier
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Digit1' || e.key === '1') setMode('white');
    if (e.code === 'Digit2' || e.key === '2') setMode('repere');
    if (e.code === 'Digit3' || e.key === '3') setMode('split');
    if (e.code === 'Digit4' || e.key === '4') setMode('millimetre');
    if (e.code === 'Digit5' || e.key === '5') setMode('seyes');
    if (e.key === 'h' || e.key === 'H') toggleUI();
    if (e.key === 'f' || e.key === 'F') toggleFullscreen();
    if (e.key === 'Escape' && document.fullscreenElement) {
      document.exitFullscreen();
    }
  });

  // Init
  setMode('white');

  // Masquer le hint après 8 secondes
  setTimeout(() => {
    document.getElementById('hint').style.transition = 'opacity 1s';
    document.getElementById('hint').style.opacity = '0';
  }, 8000);
</script>

</body>
</html>
